<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Bosque Santa Felicidade - Mapa Interativo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column;color:#c9d1d9;-webkit-tap-highlight-color:transparent}

.header{background:linear-gradient(135deg,#161b22,#0d1117);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #30363d;flex-shrink:0;z-index:100;gap:10px}
.header h1{font-size:17px;font-weight:700;color:#f0f6fc;line-height:1.2}
.header .subtitle{font-size:11px;color:#8b949e;margin-top:2px}
.header .badge{background:#238636;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}

.legend{background:#161b22;padding:6px 20px;display:flex;align-items:center;gap:16px;font-size:12px;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
.legend-dot.avail{background:#238636}
.legend-dot.sold{background:#da3633;width:8px;height:8px;border-width:1px;opacity:.7}
.legend .hint{color:#6e7681;margin-left:auto;font-size:11px}

.viewport{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none}
.viewport.panning{cursor:grabbing}

#mapWorld{position:absolute;transform-origin:0 0;will-change:transform}
#mapContainer{position:relative;display:inline-block;line-height:0}
#mapContainer img{display:block;width:1397px;height:768px;user-select:none;-webkit-user-drag:none}

.lot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);z-index:3;user-select:none}
.lot.avail{width:22px;height:22px;background:rgba(35,134,54,.92);border:2.5px solid rgba(255,255,255,.85);box-shadow:0 0 10px rgba(35,134,54,.5);cursor:pointer;transition:transform .15s,box-shadow .15s}
.lot.avail:hover,.lot.avail:active{transform:translate(-50%,-50%) scale(1.35);box-shadow:0 0 18px rgba(35,134,54,.8),0 0 0 4px rgba(255,255,255,.25);z-index:50}
.lot.sold{width:8px;height:8px;background:rgba(218,54,51,.45);border:1px solid rgba(255,255,255,.15);cursor:default}

.lot-label{position:absolute;transform:translate(-50%,-50%);font-size:8px;font-weight:700;color:rgba(255,255,255,.92);text-shadow:0 0 4px #000,0 0 8px #000,1px 1px 3px #000;pointer-events:none;z-index:4;white-space:nowrap}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:16px;width:360px;max-width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalIn .25s ease-out}
@keyframes modalIn{from{transform:translateY(20px) scale(.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-header{padding:20px 24px;color:#fff}
.modal-header.avail-header{background:linear-gradient(135deg,#238636,#2ea043)}
.modal-header.sold-header{background:linear-gradient(135deg,#da3633,#f85149)}
.modal-header h2{font-size:22px;font-weight:700;margin:0}
.modal-header .quadra-tag{font-size:13px;opacity:.85;margin-top:3px}
.modal-body{padding:20px 24px}
.modal-body .info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #21262d;font-size:15px}
.modal-body .info-row:last-child{border-bottom:none}
.modal-body .info-label{color:#8b949e}
.modal-body .info-value{font-weight:600;color:#f0f6fc;text-align:right}
.modal-body .info-value.price{color:#3fb950;font-size:20px}
.modal-body .payment{margin-top:16px;padding:14px;background:#21262d;border-radius:10px;font-size:14px;color:#8b949e;text-align:center;line-height:1.4}
.modal-body .sold-msg{text-align:center;padding:24px 0;font-size:17px;color:#f85149}
.modal-close{display:block;width:100%;padding:14px;background:#21262d;color:#c9d1d9;border:none;font-size:15px;font-weight:600;cursor:pointer;border-top:1px solid #30363d;transition:background .15s}
.modal-close:hover,.modal-close:active{background:#30363d}

/* Zoom controls */
.zoom-controls{position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:100}
.zoom-controls button{width:44px;height:44px;border-radius:10px;border:1px solid #30363d;background:rgba(22,27,34,.92);color:#f0f6fc;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.zoom-controls button:hover,.zoom-controls button:active{background:#30363d}

.zoom-indicator{position:fixed;bottom:20px;left:16px;background:rgba(22,27,34,.9);color:#8b949e;padding:6px 12px;border-radius:6px;font-size:11px;z-index:100;border:1px solid #30363d}

/* MOBILE */
@media(max-width:768px){
  .header{padding:10px 14px}
  .header h1{font-size:14px}
  .header .subtitle{display:none}
  .header .badge{font-size:11px;padding:3px 10px}
  .legend{gap:10px;padding:5px 14px;font-size:11px}
  .legend .hint{display:none}
  .lot.avail{width:28px;height:28px;border-width:3px}
  .lot-label{font-size:9px}
  .modal{width:100%;max-width:340px;border-radius:14px}
  .modal-header{padding:16px 20px}
  .modal-header h2{font-size:20px}
  .modal-body{padding:16px 20px}
  .modal-body .info-row{font-size:14px;padding:10px 0}
  .modal-body .info-value.price{font-size:18px}
  .zoom-controls button{width:48px;height:48px;font-size:24px}
  .zoom-indicator{font-size:10px;padding:4px 10px}
}
@media(max-width:400px){
  .header h1{font-size:13px}
  .lot.avail{width:32px;height:32px;border-width:3px}
  .lot-label{font-size:10px}
}
</style>
</head>

let zoom=1,panX=0,panY=0;
let isPanning=false,psx=0,psy=0;
let wasDragged=false;

const vp=document.getElementById('viewport');
const mw=document.getElementById('mapWorld');
const mc=document.getElementById('mapContainer');
const mo=document.getElementById('modalOverlay');
const md=document.getElementById('modal');

// Render
Object.entries(lotPositions).forEach(([id,pos])=>{
  const info=availableLots[id];
  const isA=!!info;
  const d=document.createElement('div');
  d.className='lot '+(isA?'avail':'sold');
  d.style.left=pos.x+'px';d.style.top=pos.y+'px';
  d.dataset.id=id;
  mc.appendChild(d);
  if(isA){
    const l=document.createElement('div');
    l.className='lot-label';
    l.style.left=pos.x+'px';l.style.top=(pos.y+16)+'px';
    l.textContent=id;
    mc.appendChild(l);
  }
});

// Click on lots (works for both mouse and touch-end)
mc.addEventListener('click',function(e){
  const lot=e.target.closest('.lot');
  if(!lot||wasDragged)return;
  e.stopPropagation();
  const id=lot.dataset.id;
  const info=availableLots[id];
  if(info){
    md.innerHTML=
      '<div class="modal-header avail-header"><h2>'+id+'</h2><div class="quadra-tag">'+info.quadra+'</div></div>'+
      '<div class="modal-body">'+
        '<div class="info-row"><span class="info-label">Área</span><span class="info-value">'+info.area+'</span></div>'+
        '<div class="info-row"><span class="info-label">Preço</span><span class="info-value price">'+info.preco+'</span></div>'+
        '<div class="payment">💳 Consulte condições de pagamento</div>'+
      '</div>'+
      '<button class="modal-close" onclick="closeM()">Fechar</button>';
  }else{
    md.innerHTML=
      '<div class="modal-header sold-header"><h2>'+id+'</h2></div>'+
      '<div class="modal-body"><div class="sold-msg">Este lote já foi vendido.</div></div>'+
      '<button class="modal-close" onclick="closeM()">Fechar</button>';
  }
  mo.classList.add('show');
});

function closeM(){mo.classList.remove('show')}
mo.addEventListener('click',e=>{if(e.target===mo)closeM()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});

// Transform
function apply(){
  mw.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
  document.getElementById('zoomIndicator').textContent=Math.round(zoom*100)+'%';
}

// Mouse pan
vp.addEventListener('mousedown',e=>{
  if(e.target.closest('.lot.avail'))return;
  isPanning=true;wasDragged=false;
  psx=e.clientX-panX;psy=e.clientY-panY;
  vp.classList.add('panning');
});
document.addEventListener('mousemove',e=>{
  if(!isPanning)return;
  const dx=e.clientX-psx-panX,dy=e.clientY-psy-panY;
  if(Math.abs(dx)>3||Math.abs(dy)>3)wasDragged=true;
  panX=e.clientX-psx;panY=e.clientY-psy;apply();
});
document.addEventListener('mouseup',()=>{isPanning=false;vp.classList.remove('panning')});

// Touch
let lastPD=0;
vp.addEventListener('touchstart',e=>{
  wasDragged=false;
  if(e.touches.length===1){
    isPanning=true;
    psx=e.touches[0].clientX-panX;psy=e.touches[0].clientY-panY;
  }else if(e.touches.length===2){
    isPanning=false;
    lastPD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isPanning){
    const dx=e.touches[0].clientX-psx-panX,dy=e.touches[0].clientY-psy-panY;
    if(Math.abs(dx)>5||Math.abs(dy)>5)wasDragged=true;
    panX=e.touches[0].clientX-psx;panY=e.touches[0].clientY-psy;apply();
  }else if(e.touches.length===2){
    wasDragged=true;
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const s=d/lastPD;const nz=Math.max(.3,Math.min(6,zoom*s));
    const r=vp.getBoundingClientRect();
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    panX=cx-(cx-panX)*(nz/zoom);panY=cy-(cy-panY)*(nz/zoom);
    zoom=nz;lastPD=d;apply();
  }
},{passive:false});
vp.addEventListener('touchend',()=>{isPanning=false});

// Scroll zoom
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?.9:1.1;const nz=Math.max(.3,Math.min(6,zoom*d));
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  panX=mx-(mx-panX)*(nz/zoom);panY=my-(my-panY)*(nz/zoom);
  zoom=nz;apply();
},{passive:false});

function zoomIn(){const r=vp.getBoundingClientRect();const cx=r.width/2,cy=r.height/2;const nz=Math.min(6,zoom*1.4);panX=cx-(cx-panX)*(nz/zoom);panY=cy-(cy-panY)*(nz/zoom);zoom=nz;apply()}
function zoomOut(){const r=vp.getBoundingClientRect();const cx=r.width/2,cy=r.height/2;const nz=Math.max(.3,zoom/1.4);panX=cx-(cx-panX)*(nz/zoom);panY=cy-(cy-panY)*(nz/zoom);zoom=nz;apply()}

function fitToScreen(){
  const r=vp.getBoundingClientRect();
  const scaleW=r.width/IMG_W;const scaleH=r.height/IMG_H;
  zoom=Math.min(scaleW,scaleH)*.95;
  panX=(r.width-IMG_W*zoom)/2;
  panY=(r.height-IMG_H*zoom)/2;
  apply();
}

// Auto-fit on load
fitToScreen();
window.addEventListener('resize',fitToScreen);
